[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback: serve index.html for all non-file routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Proxy /api requests to the backend server
[[redirects]]
  from = "/api/*"
  to = "http://103.204.53.106:3002/:splat"
  status = 200
  force = true