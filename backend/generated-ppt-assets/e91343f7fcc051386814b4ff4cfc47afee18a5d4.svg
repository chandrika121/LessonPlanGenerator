  <foreignObject x="560" y="248" width="248" height="92">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Arial, sans-serif; font-size: 15px; font-weight: 400; line-height: 1.35; color: #2d3748; width: 248px; height: 92px; overflow: hidden; overflow-wrap: anywhere; word-break: break-word; display: flex; flex-direction: column; justify-content: flex-start;">
        <div>Cube: TSA=6a², V=a³</div><div>Cuboid: TSA=2(lw+wh+lh),</div><div>V=lwh</div><div>Cylinder: CSA=2πrh, V=πr²h</div>
