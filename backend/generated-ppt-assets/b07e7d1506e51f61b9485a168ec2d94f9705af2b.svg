  <text x="570" y="208" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1a5f7a">Cuboid Visual Guide</text>
  <foreignObject x="560" y="248" width="248" height="92">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Arial, sans-serif; font-size: 12px; font-weight: 400; line-height: 1.35; color: #2d3748; width: 248px; height: 92px; overflow: hidden; overflow-wrap: anywhere; word-break: break-word; display: flex; flex-direction: column; justify-content: flex-start;">
        <div>Cube: Side = &amp;apos;a&amp;apos;</div><div>- TSA = 6a² | CSA = 4a² | Volume =</div><div>a³</div><div>Cuboid: Length=l, Width=w, Height=h</div>
